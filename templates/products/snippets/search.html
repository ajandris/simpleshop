            <div class="w3-padding-small w3-center" id="search-wrapper">
                        <form action="{% url 'products' %}" method="post">
                            <input
                                type="text"
                                name="q"
                                placeholder=" Search products..."
                                value="{{ search_criteria|default:'' }}"
                            >
                            <button type="submit"><span>Search</span></button>
                            {% csrf_token %}
                        </form>
            </div>
